name: bishhealth
description: AI-powered health tracker app that integrates system health data and provides personalized health insights.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  riverpod_generator: ^2.3.0
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.0
  
  # Local Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  
  # AI/ML
  google_generative_ai: ^0.3.0
  tflite_flutter: ^0.10.0
  
  # Health & Sensors
  health: ^10.1.0
  sensors_plus: ^2.0.0
  permission_handler: ^11.4.0
  
  # UI Components
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.0
  shimmer: ^3.0.0
  fl_chart: ^0.65.0
  table_calendar: ^3.0.0
  smooth_page_indicator: ^1.1.0
  
  # Notifications
  flutter_local_notifications: ^14.1.0
  timezone: ^0.9.0
  
  # Firebase (Optional - for backend)
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.6.0
  
  # Utilities
  uuid: ^4.0.0
  logger: ^2.1.0
  connectivity_plus: ^5.0.0
  package_info_plus: ^5.0.0
  
  # Device Info
  device_info_plus: ^9.1.0
  
  # Image Processing
  image_picker: ^1.0.0
  image: ^4.0.0
  
  # Date & Time
  get_time_ago: ^0.0.7
  moment_dart: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  riverpod_generator: ^2.3.0
  mockito: ^5.4.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700