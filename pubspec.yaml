name: bishhealth
description: A Flutter health app with AI/ML integration.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  provider: ^6.0.0
  google_ml_kit: ^0.14.0
  tflite_flutter: ^0.10.0
  image_picker: ^0.8.7+5
  camera: ^0.10.5+5
  permission_handler: ^11.4.3
  intl: ^0.19.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.1
  flutter_dotenv: ^5.1.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - .env
